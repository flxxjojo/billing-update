<!DOCTYPE html>
<html lang="en">
<head>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff; /* white background for email */
  }

  .banner-container {
    position: relative;
    width: 650px;            /* final width */
    max-width: 100%;
    margin: 0 auto;           /* horizontally center */
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;         /* crop extra */
    height: 400px;            /* fixed height for PNG */
  }

  .banner-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;

    /* force hover effect for screenshot */
    transform: scale(1.03);
    filter: brightness(0.9);
  }

  .banner-btn {
    position: absolute;
    bottom: 30px;             /* nicely above bottom edge */
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 47, 255, 0.8);
    color: white;
    padding: 14px 28px;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
    font-size: 18px;
  }

  .banner-btn:hover {
    background: rgba(0, 47, 255, 1);
    transform: translateX(-50%) scale(1.05);
  }
</style>
</head>

<body>

<div id="banner" class="banner-container">
  <img src="ebay.jpg" alt="Banner Image">
  <a href="https://billing-api-n392.onrender.com/billing" class="banner-btn">
    Click here to proceed!
  </a>
</div>

</body>
</html>
